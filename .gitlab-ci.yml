image: node:24.11.1

stages:
  - deploy

variables:
  NPM_CONFIG_CACHE: .npm

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

pages:
  stage: deploy
  script:
    - npm install --prefer-offline --include=dev
    - |
      export VITE_BASE_URL="$(node -e "const raw = process.env.CI_PAGES_URL || ''; if (!raw) { const name = (process.env.CI_PROJECT_NAME || '').replace(/^\/+|\/+$/g, ''); process.stdout.write(name ? '/' + name + '/' : '/'); process.exit(0); } const pathname = new URL(raw).pathname.replace(/\/+$/, ''); process.stdout.write(pathname ? pathname + '/' : '/');")"
      export VITE_OUT_DIR=public
      echo "GitLab Pages base path: ${VITE_BASE_URL}"
    - NODE_ENV=production npm run build -- --mode gitlab-pages
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
