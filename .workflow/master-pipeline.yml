version: '1.0'
name: master-pipeline
displayName: 玄工智链前端流水线
stages:
  - stage:
      name: lint
      displayName: 代码检查
      steps:
        - step: build@nodejs
          name: install_and_lint
          displayName: 安装依赖并检查代码
          nodeVersion: 20.18.0
          commands:
            - npm ci
            - npm run lint:eslint
            - npm run type-check
          # 缓存 node_modules
          caches:
            - path: node_modules
              key: $(CACHE_KEY)-node_modules
              restoreKeys:
                - $(CACHE_KEY)-node_modules-
  - stage:
      name: test
      displayName: 运行测试
      steps:
        - step: build@nodejs
          name: run_test
          displayName: 运行单元测试
          nodeVersion: 20.18.0
          commands:
            - npm ci
            - npm run test || true
          caches:
            - path: node_modules
              key: $(CACHE_KEY)-node_modules
              restoreKeys:
                - $(CACHE_KEY)-node_modules-
      # 测试失败不阻断后续流程
      enable: false
  - stage:
      name: build
      displayName: 构建项目
      steps:
        - step: build@nodejs
          name: build_project
          displayName: 构建生产环境
          nodeVersion: 20.18.0
          commands:
            - npm ci
            - npm run build
          env:
            NODE_ENV: production
            VITE_DROP_CONSOLE: true
            VITE_DROP_DEBUGGER: true
            VITE_SOURCEMAP: false
          caches:
            - path: node_modules
              key: $(CACHE_KEY)-node_modules
              restoreKeys:
                - $(CACHE_KEY)-node_modules-
          # 构建产物暂存
          artifacts:
            - name: BUILD_ARTIFACT
              path:
                - ./dist
  - stage:
      name: deploy
      displayName: 部署
      steps:
        - step: publish@general_artifacts
          name: publish_general_artifacts
          displayName: 上传构建产物
          dependArtifact: BUILD_ARTIFACT
          artifactName: dist
          dependsOn: build_project
        # 如果需要部署到服务器，可以使用 SSH 插件
        # - step: ssh@deploy
        #   name: deploy_to_server
        #   displayName: 部署到服务器
        #   host: ${{REMOTE_HOST}}
        #   user: ${{REMOTE_USER}}
        #   sshKey: ${{SSH_PRIVATE_KEY}}
        #   commands:
        #     - cd /var/www/starlink-mos-frontend
        #     - rm -rf *
        #     - cp -r /path/to/dist/* .
        #     - pm2 restart starlink-frontend
        #   dependsOn: publish_general_artifacts
triggers:
  push:
    branches:
      include:
        - master
        - develop
  # 定时触发（可选）
  # schedule:
  #   - cron: '0 2 * * *'
  #     branches:
  #       include:
  #         - master
# 全局环境变量
variables:
  # 自定义变量，在 Gitee 流水线设置中配置
  # REMOTE_HOST: ''
  # REMOTE_USER: ''
  # CACHE_KEY: $(CI_PIPELINE_ID)
